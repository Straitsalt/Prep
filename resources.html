<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrepAce - Study Resources</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="dashboard">

    <div class="topbar">

        <h2>📚 Study Resources</h2>

        <button onclick="location.href='dashboard.html'">
            ⬅ Dashboard
        </button>

    </div>

    <input
        type="text"
        id="search"
        placeholder="🔍 Search Notes..."
        onkeyup="searchPDF()"
    >

    <br><br>

    <div class="card green">

        <div class="icon">🧬</div>

        <h2>Biology</h2>

        <p>NCERT Notes & PDFs</p>

        <button onclick="location.href='biology.html'">
            Open
        </button>

    </div>

    <div class="card blue">

        <div class="icon">⚛️</div>

        <h2>Physics</h2>

        <p>Concept Notes & Formula Sheets</p>

        <button onclick="location.href='physics.html'">
            Open
        </button>

    </div>

    <div class="card orange">

        <div class="icon">🧪</div>

        <h2>Chemistry</h2>

        <p>Organic, Inorganic & Physical</p>

        <button onclick="location.href='chemistry.html'">
            Open
        </button>

    </div>

    <div class="card purple">

        <div class="icon">📐</div>

        <h2>Mathematics</h2>

        <p>JEE Mathematics Resources</p>

        <button onclick="location.href='maths.html'">
            Open
        </button>

    </div>

</div>

<script>
function searchPDF(){

    const input = document
        .getElementById("search")
        .value
        .toLowerCase();

    const cards = document.querySelectorAll(".card");

    cards.forEach(card=>{

        if(card.innerText.toLowerCase().includes(input))
            card.style.display="block";
        else
            card.style.display="none";

    });

}
</script>

</body>
</html>
